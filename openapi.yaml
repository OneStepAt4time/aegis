  /v1/analytics/costs:
    get:
      summary: "Cost breakdown by model and key"
      description: "Aggregated cost breakdown derived from MetricsCache. Returns per-model, per-key, and daily cost trends."
      operationId: "getAnalyticsCosts"
      tags:
        - "Analytics"

      responses:
