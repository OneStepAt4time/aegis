          description: "Success"
          content:
            application/json:
              schema: {}



        "404":
          description: "Not found"


      operationId: "getV1SessionsIdHealth"


  "/v1/sessions/{id}/send":
    post:
      summary: "Send message to session"
      tags:
        - "Session Actions"

      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Session UUID"
          schema:
            type: "string"
            format: "uuid"
            pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$"



      requestBody:
        description: null
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                text:
                  type: "string"
                  minLength: 1
                  maxLength: 10000


              required:
                - "text"

              additionalProperties: false




      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  ok:
                    type: "boolean"

                  delivered:
                    type: "boolean"

                  attempts:
                    type: "number"


                required:
                  - "ok"
                  - "delivered"
                  - "attempts"

                additionalProperties: false




        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error:
                    type: "string"

                  details:
                    type: "array"
                    items: {}


                required:
                  - "error"

                additionalProperties: false




        "404":
          description: "Not found"


      operationId: "postV1SessionsIdSend"


