                    type: "number"

                  totalSessions:
                    type: "number"

                  byModel:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        model:
                          type: "string"

                        estimatedCostUsd:
                          type: "number"

                        inputTokens:
                          type: "number"

                        outputTokens:
                          type: "number"

                        cacheCreationTokens:
                          type: "number"

                        cacheReadTokens:
                          type: "number"


                      required:
                        - "model"
                        - "estimatedCostUsd"
                        - "inputTokens"
                        - "outputTokens"
                        - "cacheCreationTokens"
                        - "cacheReadTokens"

                      additionalProperties: false


                  byKey:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        keyId:
                          type: "string"

                        keyName:
                          type: "string"

                        estimatedCostUsd:
                          type: "number"

                        sessions:
                          type: "number"

                        messages:
                          type: "number"


                      required:
                        - "keyId"
                        - "keyName"
                        - "estimatedCostUsd"
                        - "sessions"
                        - "messages"

                      additionalProperties: false


                  dailyTrends:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        date:
                          type: "string"

                        estimatedCostUsd:
                          type: "number"

                        sessions:
                          type: "number"


                      required:
                        - "date"
                        - "estimatedCostUsd"
                        - "sessions"

                      additionalProperties: false


                  generatedAt:
                    type: "string"


                required:
                  - "totalCostUsd"
                  - "totalSessions"
                  - "byModel"
                  - "byKey"
                  - "dailyTrends"
                  - "generatedAt"

                additionalProperties: false




        "401":
          description: "Unauthorized — Bearer token required"

        "403":
          description: "Forbidden: insufficient role"




  /v1/analytics/rate-limits:
    get:
      summary: "Rate-limit and quota usage"
      description: "Current rate-limit / quota usage per API key with session forecast based on remaining headroom."
      operationId: "getAnalyticsRateLimits"
      tags:
        - "Analytics"

      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  global:
                    type: "object"
                    properties:
                      max:
                        type: "number"

                      timeWindowMs:
                        type: "number"


                    required:
                      - "max"
                      - "timeWindowMs"

                    additionalProperties: false

                  perKey:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        keyId:
                          type: "string"

                        keyName:
                          type: "string"

                        activeSessions:
                          type: "number"

                        maxSessions:
                          anyOf:
                            - type: "number"

                            - type: "null"



                        tokensInWindow:
                          type: "number"

                        maxTokens:
                          anyOf:
                            - type: "number"

                            - type: "null"



                        spendInWindowUsd:
                          type: "number"

                        maxSpendUsd:
                          anyOf:
                            - type: "number"

                            - type: "null"



                        windowMs:
                          type: "number"


                      required:
                        - "keyId"
                        - "keyName"
                        - "activeSessions"
                        - "maxSessions"
                        - "tokensInWindow"
                        - "maxTokens"
                        - "spendInWindowUsd"
                        - "maxSpendUsd"
                        - "windowMs"

                      additionalProperties: false


                  forecast:
                    type: "object"
                    properties:
                      estimatedSessionsRemaining:
                        anyOf:
                          - type: "number"

                          - type: "null"



                      bottleneck:
                        anyOf:
                          - type: "string"
                            enum:
                              - "concurrent_sessions"
                              - "tokens_per_window"
                              - "spend_per_window"


                          - type: "null"




                    required:
                      - "estimatedSessionsRemaining"
                      - "bottleneck"

                    additionalProperties: false

                  generatedAt:
                    type: "string"


                required:
                  - "global"
                  - "perKey"
                  - "forecast"
                  - "generatedAt"

                additionalProperties: false




        "401":
          description: "Unauthorized — Bearer token required"

        "403":
          description: "Forbidden: insufficient role"




  /v1/audit:
    get:
      summary: "Audit log"
      description: "Query or export audit log records with cursor or offset pagination, time filters, and CSV/NDJSON exports. Requires audit permission."
      operationId: "getAuditLog"
      tags:
        - "Metrics"

      parameters:
        - name: "actor"
          in: "query"
          required: false
          description: "Filter by actor label (backward compat)"
          schema:
            type: "string"


        - name: "actorKeyId"
          in: "query"
          required: false
          description: "Filter by actor key identifier"
          schema:
            type: "string"


        - name: "action"
          in: "query"
          required: false
          schema:
            type: "string"


        - name: "sessionId"
          in: "query"
          required: false
          schema:
            type: "string"


        - name: "from"
          in: "query"
          required: false
          description: "Inclusive lower timestamp bound (ISO 8601)"
          schema:
            type: "string"


        - name: "to"
          in: "query"
          required: false
          description: "Inclusive upper timestamp bound (ISO 8601)"
          schema:
            type: "string"


        - name: "cursor"
          in: "query"
          required: false
          description: "Pagination cursor (record hash) — use with cursor-based pagination"
          schema:
            type: "string"


        - name: "limit"
          in: "query"
          required: false
          schema:
            type: "integer"
            minimum: 1
            maximum: 1000


        - name: "offset"
          in: "query"
          required: false
          description: "Offset for offset-based pagination — triggers export record format"
          schema:
            type: "integer"
            minimum: 0
            maximum: 9007199254740991


        - name: "reverse"
          in: "query"
          required: false
          schema:
            type: "boolean"


        - name: "verify"
          in: "query"
          required: false
          schema:
            type: "boolean"


        - name: "format"
          in: "query"
          required: false
          schema:
            type: "string"
            enum:
              - "json"
              - "csv"
              - "ndjson"




      responses:
        "200":
          description: "Success — returns cursor-paginated records, offset-paginated export records, or CSV/NDJSON export"
          content:
            application/json:
              schema: {}

            text/csv:
              schema:
                type: "string"


            application/x-ndjson:
              schema:
                type: "string"




        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error:
                    type: "string"

                  details:
                    type: "array"
                    items: {}


                required:
                  - "error"

                additionalProperties: false




        "401":
          description: "Unauthorized — Bearer token required"

        "403":
          description: "Forbidden: insufficient role"





components:
  securitySchemes:
    BearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "API key"


  parameters:
    sessionId:
      name: "id"
      in: "path"
      required: true
      schema:
        type: "string"

      description: "Session ID"

    limit:
      name: "limit"
      in: "query"
      schema:
        type: "integer"
        default: 50
        minimum: 1
        maximum: 200


    offset:
      name: "offset"
      in: "query"
      schema:
        type: "integer"
        default: 0



  responses:
    BadRequest:
      description: "Invalid request body or parameters"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              error:
                type: "string"






    Unauthorized:
      description: "Missing or invalid authentication token"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              error:
                type: "string"
                example: "Unauthorized"






    NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              error:
                type: "string"
                example: "Not found"







  schemas:
    ApiKeyRole:
      type: "string"
      enum:
        - "viewer"
        - "operator"
        - "admin"


    VerifyTokenRequest:
      type: "object"
      properties:
        token:
          type: "string"


      required:
        - "token"

      additionalProperties: false

    VerifyTokenResponse:
      type: "object"
      properties:
        valid:
          type: "boolean"

        role:
          $ref: "#/components/schemas/ApiKeyRole"


      required:
        - "valid"


    HealthResponse:
      type: "object"
      properties:
        status:
          type: "string"
          enum:
            - "ok"


        version:
          type: "string"
          example: "0.6.5-preview.1"

        uptime:
          type: "integer"
          description: "Seconds since server start"

        sessions:
          type: "object"
          properties:
            active:
              type: "integer"

            total:
              type: "integer"





    ApiKey:
      type: "object"
      properties:
        id:
          type: "string"

        name:
          type: "string"

        keyId:
          type: "string"
          description: "First 8 characters of the key hash"

        createdAt:
          type: "integer"

        expiresAt:
          type: "integer"
          nullable: true

        lastUsedAt:
          type: "integer"
          nullable: true



    ApiKeyCreated:
      type: "object"
      properties:
        id:
          type: "string"

        name:
          type: "string"

        key:
          type: "string"
          description: "Full plaintext key — shown ONLY here, never again"

        keyId:
          type: "string"

        createdAt:
          type: "integer"



    HandshakeResponse:
      type: "object"
      properties:
        protocolVersion:
          type: "string"

        serverCapabilities:
          type: "array"
          items:
            type: "string"


        negotiatedCapabilities:
          type: "array"
          items:
            type: "string"


        warnings:
          type: "array"
          items:
            type: "string"


        compatible:
          type: "boolean"



    CreateSessionRequest:
      type: "object"
      properties:
        name:
          type: "string"
          description: "Human-readable session name"
          example: "feature-auth"

        workDir:
          type: "string"
          description: "Working directory for Claude Code"
          example: "/home/user/my-project"

        prompt:
          type: "string"
          description: "Initial prompt to send to Claude Code"

        permissionMode:
          type: "string"
          enum:
            - "default"
            - "bypassPermissions"
            - "plan"
            - "acceptEdits"
            - "dontAsk"
            - "auto"

          default: "default"

        autoApprove:
          type: "boolean"
          default: false

        env:
          type: "object"
          additionalProperties:
            type: "string"

          description: "Environment variables to inject into the session"

        claudeCommand:
          type: "string"
          maxLength: 10000
          description: "Custom Claude Code command/flags"

        maxSessionAgeMs:
          type: "integer"
          description: "Maximum session lifetime in milliseconds"

        stallThresholdMs:
          type: "integer"
          description: "Stall detection threshold override"


      required:
        - "workDir"


    SessionCreated:
      type: "object"
      properties:
        id:
          type: "string"

        name:
          type: "string"

        status:
          type: "string"
          example: "working"

        workDir:
          type: "string"

        reused:
          type: "boolean"
          example: false

        promptDelivery:
          type: "object"
          properties:
            delivered:
              type: "boolean"

            attempts:
              type: "integer"





    SessionReused:
      allOf:
        - $ref: "#/components/schemas/SessionCreated"

        - type: "object"
          properties:
            reused:
              type: "boolean"
              example: true





    SessionInfo:
      type: "object"
      properties:
        id:
          type: "string"

        windowId:
          type: "string"

        windowName:
          type: "string"

        workDir:
          type: "string"

        claudeSessionId:
          type: "string"

        jsonlPath:
          type: "string"

        byteOffset:
          type: "integer"

        monitorOffset:
          type: "integer"

        status:
          type: "string"
          enum:
            - "idle"
            - "working"
            - "compacting"
            - "context_warning"
            - "waiting_for_input"
            - "permission_prompt"
            - "plan_mode"
            - "ask_question"
            - "bash_approval"
            - "settings"
            - "error"
            - "rate_limit"
            - "unknown"


        createdAt:
          type: "integer"

        lastActivity:
          type: "integer"

        stallThresholdMs:
          type: "integer"

        permissionStallMs:
          type: "integer"

        permissionMode:
          type: "string"

        settingsPatched:
          type: "boolean"

        hookSettingsFile:
          type: "string"

        hookSecret:
          type: "string"

        lastHookAt:
          type: "integer"

        activeSubagents:
          type: "array"
          items:
            type: "string"


        permissionPromptAt:
          type: "integer"

        permissionRespondedAt:
          type: "integer"

        lastHookReceivedAt:
          type: "integer"

        lastHookEventAt:
          type: "integer"

        model:
          type: "string"

        lastDeadAt:
          type: "integer"

        ccPid:
          type: "integer"

        parentId:
          type: "string"

        children:
          type: "array"
          items:
            type: "string"


        permissionPolicy:
          type: "array"
          items:
            type: "object"


        permissionProfile:
          type: "object"

        prd:
          type: "string"

        ownerKeyId:
          type: "string"



    SessionHealth:
      type: "object"
      properties:
        alive:
          type: "boolean"

        windowExists:
          type: "boolean"

        paneState:
          type: "string"

        lastSeen:
          type: "integer"

        suggestion:
          type: "string"
          nullable: true



    SessionMetrics:
      type: "object"
      properties:
        messages:
          type: "integer"

        toolCalls:
          type: "integer"

        approvals:
          type: "integer"

        autoApprovals:
          type: "integer"

        statusChanges:
          type: "array"
          items:
            type: "object"


        tokenUsage:
          type: "object"
          properties:
            inputTokens:
              type: "integer"

            outputTokens:
              type: "integer"

            cacheCreation:
              type: "integer"

            cacheRead:
              type: "integer"

            estimatedCostUsd:
              type: "number"
              format: "float"





    TranscriptEntry:
      type: "object"
      properties:
        id:
          type: "integer"

        role:
          type: "string"
          enum:
            - "user"
            - "assistant"
            - "system"


        content:
          type: "string"

        timestamp:
          type: "integer"

        toolCalls:
          type: "array"
          items:
            type: "object"




    VerificationResult:
      type: "object"
      properties:
        success:
          type: "boolean"

        output:
          type: "string"

        durationMs:
          type: "integer"

        exitCode:
          type: "integer"



    SessionTemplate:
      type: "object"
      properties:
        id:
          type: "string"

        name:
          type: "string"

        description:
          type: "string"

        prompt:
          type: "string"

        workDir:
          type: "string"

        permissionMode:
          type: "string"

        tags:
          type: "array"
          items:
            type: "string"


        createdAt:
          type: "integer"



    CreateTemplateRequest:
      type: "object"
      properties:
        name:
          type: "string"

        description:
          type: "string"

        prompt:
          type: "string"

        workDir:
          type: "string"

        permissionMode:
          type: "string"
          enum:
            - "default"
            - "bypassPermissions"
            - "plan"
            - "acceptEdits"
            - "dontAsk"
            - "auto"


        tags:
          type: "array"
          items:
            type: "string"



      required:
        - "name"
        - "prompt"


    CreatePipelineRequest:
      type: "object"
      properties:
        name:
          type: "string"

        stages:
          type: "array"
          maxItems: 50
          items:
            type: "object"
            properties:
              id:
                type: "string"

              prompt:
                type: "string"

              workDir:
                type: "string"

              permissionMode:
                type: "string"

              dependencies:
                type: "array"
                items:
                  type: "string"


              maxSessionAgeMs:
                type: "integer"



          required:
            - "id"
            - "prompt"
            - "workDir"



      required:
        - "stages"


    GlobalMetrics:
      type: "object"
      properties:
        sessionsCreated:
          type: "integer"

        sessionsCompleted:
          type: "integer"

        sessionsFailed:
          type: "integer"

        totalMessages:
          type: "integer"

        totalToolCalls:
          type: "integer"

        autoApprovals:
          type: "integer"

        webhooksSent:
          type: "integer"

        webhooksFailed:
          type: "integer"

        screenshotsTaken:
          type: "integer"

        pipelinesCreated:
          type: "integer"

        batchesCreated:
          type: "integer"

        promptsSent:
          type: "integer"

        promptsDelivered:
          type: "integer"

        promptsFailed:
          type: "integer"

        avgDurationSec:
          type: "number"
          format: "float"



    SessionStatusFilter:
      type: "string"
      enum:
        - "all"
        - "idle"
        - "working"
        - "compacting"
        - "context_warning"
        - "waiting_for_input"
        - "permission_prompt"
        - "plan_mode"
        - "ask_question"
        - "bash_approval"
        - "settings"
        - "error"
        - "rate_limit"
        - "unknown"
