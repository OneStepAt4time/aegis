          content:
            application/json:
              schema:
                type: "object"
                properties:
                  ok:
                    type: "boolean"

                  output:
                    type: "string"


                required:
                  - "ok"

                additionalProperties: false




        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error:
                    type: "string"

                  details:
                    type: "array"
                    items: {}


                required:
                  - "error"

                additionalProperties: false




        "404":
          description: "Not found"


      operationId: "postV1SessionsIdBash"


