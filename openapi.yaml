# ─── Components ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key

  parameters:
    sessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Session ID
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Not found

  schemas:
    ApiKeyRole:
      type: string
      enum: [viewer, operator, admin]

    VerifyTokenRequest:
      type: object
      properties:
        token:
          type: string
      required: [token]
      additionalProperties: false

    VerifyTokenResponse:
      type: object
      properties:
        valid:
          type: boolean
        role:
          $ref: '#/components/schemas/ApiKeyRole'
      required: [valid]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          example: 0.3.2-alpha
        uptime:
          type: integer
          description: Seconds since server start
        sessions:
          type: object
          properties:
            active:
              type: integer
            total:
              type: integer

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyId:
          type: string
          description: First 8 characters of the key hash
        createdAt:
          type: integer
        expiresAt:
          type: integer
          nullable: true
        lastUsedAt:
          type: integer
          nullable: true

    ApiKeyCreated:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Full plaintext key — shown ONLY here, never again
        keyId:
          type: string
        createdAt:
          type: integer

    HandshakeResponse:
      type: object
      properties:
        protocolVersion:
          type: string
        serverCapabilities:
          type: array
          items:
            type: string
        negotiatedCapabilities:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        compatible:
          type: boolean

    CreateSessionRequest:
      type: object
      properties:
        name:
          type: string
          description: Human-readable session name
          example: feature-auth
        workDir:
          type: string
          description: Working directory for Claude Code
          example: /home/user/my-project
        prompt:
          type: string
          description: Initial prompt to send to Claude Code
        permissionMode:
          type: string
          enum: [default, bypassPermissions, plan, acceptEdits, dontAsk, auto]
          default: default
        autoApprove:
          type: boolean
          default: false
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables to inject into the session
        claudeCommand:
          type: string
          maxLength: 10000
          description: Custom Claude Code command/flags
        maxSessionAgeMs:
          type: integer
          description: Maximum session lifetime in milliseconds
        stallThresholdMs:
          type: integer
          description: Stall detection threshold override
      required: [workDir]

    SessionCreated:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          example: working
        workDir:
          type: string
        reused:
          type: boolean
          example: false
        promptDelivery:
          type: object
          properties:
            delivered:
              type: boolean
            attempts:
              type: integer

    SessionReused:
      allOf:
        - $ref: '#/components/schemas/SessionCreated'
        - type: object
          properties:
            reused:
              type: boolean
              example: true

    SessionInfo:
      type: object
      properties:
        id:
          type: string
        windowId:
          type: string
        windowName:
          type: string
        workDir:
          type: string
        claudeSessionId:
          type: string
        jsonlPath:
          type: string
        byteOffset:
          type: integer
        monitorOffset:
          type: integer
        status:
          type: string
          enum: [idle, working, compacting, context_warning, waiting_for_input, permission_prompt, plan_mode, ask_question, bash_approval, settings, error, unknown]
        createdAt:
          type: integer
        lastActivity:
          type: integer
        stallThresholdMs:
          type: integer
        permissionStallMs:
          type: integer
        permissionMode:
          type: string
        settingsPatched:
          type: boolean
        hookSettingsFile:
          type: string
        hookSecret:
          type: string
        lastHookAt:
          type: integer
        activeSubagents:
          type: array
          items:
            type: string
        permissionPromptAt:
          type: integer
        permissionRespondedAt:
          type: integer
        lastHookReceivedAt:
          type: integer
        lastHookEventAt:
          type: integer
        model:
          type: string
        lastDeadAt:
          type: integer
        ccPid:
          type: integer
        parentId:
          type: string
        children:
          type: array
          items:
            type: string
        permissionPolicy:
          type: array
          items:
            type: object
        permissionProfile:
          type: object
        prd:
          type: string
        ownerKeyId:
          type: string

    SessionHealth:
      type: object
      properties:
        alive:
          type: boolean
        windowExists:
          type: boolean
        paneState:
          type: string
        lastSeen:
          type: integer
        suggestion:
          type: string
          nullable: true

    SessionMetrics:
      type: object
      properties:
        messages:
          type: integer
        toolCalls:
          type: integer
        approvals:
          type: integer
        autoApprovals:
          type: integer
        statusChanges:
          type: array
          items:
            type: object
        tokenUsage:
          type: object
          properties:
            inputTokens:
              type: integer
            outputTokens:
              type: integer
            cacheCreation:
              type: integer
            cacheRead:
              type: integer
            estimatedCostUsd:
              type: number
              format: float

    TranscriptEntry:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        timestamp:
          type: integer
        toolCalls:
          type: array
          items:
            type: object

    VerificationResult:
      type: object
      properties:
        success:
          type: boolean
        output:
          type: string
        durationMs:
          type: integer
        exitCode:
          type: integer

    SessionTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        prompt:
          type: string
        workDir:
          type: string
        permissionMode:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: integer

    CreateTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        prompt:
          type: string
        workDir:
          type: string
        permissionMode:
          type: string
          enum: [default, bypassPermissions, plan, acceptEdits, dontAsk, auto]
        tags:
          type: array
          items:
            type: string
      required: [name, prompt]

    CreatePipelineRequest:
      type: object
      properties:
        name:
          type: string
        stages:
          type: array
          maxItems: 50
          items:
            type: object
            properties:
              id:
                type: string
              prompt:
                type: string
              workDir:
                type: string
              permissionMode:
                type: string
              dependencies:
                type: array
                items:
                  type: string
              maxSessionAgeMs:
                type: integer
          required: [id, prompt, workDir]
      required: [stages]

    GlobalMetrics:
      type: object
      properties:
        sessionsCreated:
          type: integer
        sessionsCompleted:
          type: integer
        sessionsFailed:
          type: integer
        totalMessages:
          type: integer
        totalToolCalls:
          type: integer
        autoApprovals:
          type: integer
        webhooksSent:
          type: integer
        webhooksFailed:
          type: integer
        screenshotsTaken:
          type: integer
        pipelinesCreated:
          type: integer
        batchesCreated:
          type: integer
        promptsSent:
          type: integer
        promptsDelivered:
          type: integer
        promptsFailed:
          type: integer
        avgDurationSec:
          type: number
          format: float

    SessionStatusFilter:
      type: string
      enum: [all, idle, working, compacting, context_warning, waiting_for_input, permission_prompt, plan_mode, ask_question, bash_approval, settings, error, unknown]
