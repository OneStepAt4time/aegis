openapi: 3.1.0
info:
  title: Aegis API
  version: 1.0.0
  description: |
    Orchestrate Claude Code sessions via REST API. Aegis wraps Claude Code in tmux sessions
    and exposes everything through a unified API.

    **Base URL:** `http://localhost:9100`

    **Authentication:** All endpoints except `/v1/health` and `/health` require a bearer token.
    Pass `Authorization: Bearer <your-token>` header, or set `AEGIS_AUTH_TOKEN` env var.

    **Session lifecycle:** `working` → `idle` → `permission_prompt` → `asking` → `stalled`
servers:
  - url: http://localhost:9100
    description: Local Aegis server

security:
  - BearerAuth: []

paths:
  # ─── Health & Info ─────────────────────────────────────────────────────────

  /v1/health:
    get:
      operationId: getHealth
      summary: Server health check
      security: []
      tags: [Health]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /health:
    get:
      operationId: getHealthAlias
      summary: Server health check (alias)
      security: []
      tags: [Health]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/swarm:
    get:
      operationId: getSwarmStatus
      summary: Get tmux swarm status
      tags: [System]
      responses:
        '200':
          description: Swarm status
          content:
            application/json:
              schema:
                type: object
                properties:
                  monitors:
                    type: integer
                    description: Number of active swarm monitors
                  activeWindows:
                    type: integer
                    description: Number of active Claude Code windows across all monitors

  # ─── Authentication ────────────────────────────────────────────────────────

  /v1/auth/verify:
    post:
      operationId: verifyApiToken
      summary: Verify an API token and return its role
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTokenRequest'
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyTokenResponse'
        '429':
          description: Token is valid but currently rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyTokenResponse'

  /v1/auth/keys:
    get:
      operationId: listApiKeys
      summary: List all API keys
      tags: [Auth]
      responses:
        '200':
          description: List of API keys (plaintext shown only at creation)
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createApiKey
      summary: Create a new API key
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Human-readable name for this key
                  example: production-operator
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration timestamp (ISO 8601)
                  example: '2025-12-31T23:59:59Z'
              required: [name]
      responses:
        '201':
          description: API key created (plaintext shown only now)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/keys/{id}:
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key
      tags: [Auth]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: API key ID
      responses:
        '204':
          description: API key revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/auth/sse-token:
    post:
      operationId: createSseToken
      summary: Generate a short-lived SSE token for browser clients
      tags: [Auth]
      description: |
        SSE tokens are short-lived (60s), single-use, and allow EventSource clients
        (which cannot set custom headers) to authenticate SSE subscriptions.
      responses:
        '200':
          description: SSE token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Short-lived SSE token
                  expiresAt:
                    type: integer
                    description: Unix timestamp of expiration
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/handshake:
    post:
      operationId: negotiateHandshake
      summary: Capability negotiation
      tags: [System]
      security: []
      description: |
        Before using advanced integration paths, clients can negotiate capabilities
        with Aegis. This prevents version-drift breakage.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                protocolVersion:
                  type: string
                  example: '1'
                clientCapabilities:
                  type: array
                  items:
                    type: string
                  example: ['session.create', 'session.transcript.cursor']
      responses:
        '200':
          description: Negotiation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandshakeResponse'
        '409':
          description: Protocol version conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  compatible:
                    type: boolean
                    example: false
                  message:
                    type: string

  /v1/hooks/{eventName}:
    post:
      operationId: receiveHookEvent
      summary: Receive Claude Code hook event
      tags: [Hooks]
      security: []
      description: |
        Inbound callback endpoint for Claude Code HTTP hooks.

        Preferred transport is `X-Hook-Secret` header authentication.
        Query-param `secret` is deprecated and only accepted in compatibility mode
        (`AEGIS_HOOK_SECRET_HEADER_ONLY=false`, default). When
        `AEGIS_HOOK_SECRET_HEADER_ONLY=true`, any request using query-param
        hook secrets is rejected.
      parameters:
        - name: eventName
          in: path
          required: true
          schema:
            type: string
          description: Hook event name (for example Stop, PreToolUse, PermissionRequest)
        - name: X-Session-Id
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Session ID (preferred transport).
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Session ID fallback when header transport is unavailable.
        - name: X-Hook-Secret
          in: header
          required: false
          schema:
            type: string
          description: Hook secret header. Required when the session has a configured hook secret.
        - name: secret
          in: query
          required: false
          deprecated: true
          schema:
            type: string
          description: |
            Deprecated query-param hook secret.
            Accepted only in compatibility mode and rejected in header-only mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Hook event accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Sessions ─────────────────────────────────────────────────────────────

  /v1/sessions:
    get:
      operationId: listSessions
      summary: List all sessions
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SessionStatusFilter'
          description: Filter by session UI state
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionInfo'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createSession
      summary: Create or reuse a session
      tags: [Sessions]
      description: |
        Creates a new Claude Code session or reuses an existing idle session for the same `workDir`.
        Returns `201` for new sessions, `200` for reused ones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: New session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '200':
          description: Existing idle session reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionReused'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Session creation conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  sessionId:
                    type: string

  /v1/sessions/stats:
    get:
      operationId: getSessionStats
      summary: Get session statistics
      tags: [Sessions]
      responses:
        '200':
          description: Session statistics
          content:
            application/json:
              schema:
                type: object

  /v1/sessions/batch:
    post:
      operationId: batchCreateSessions
      summary: Batch create multiple sessions
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessions:
                  type: array
                  maxItems: 50
                  items:
                    $ref: '#/components/schemas/CreateSessionRequest'
              required: [sessions]
      responses:
        '201':
          description: Sessions created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: batchDeleteSessions
      summary: Kill multiple sessions
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Session IDs to kill
              required: [ids]
      responses:
        '200':
          description: Sessions killed
          content:
            application/json:
              schema:
                type: object
                properties:
                  killed:
                    type: array
                    items:
                      type: string
                  notFound:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/sessions/{id}:
    get:
      operationId: getSession
      summary: Get session details
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: killSession
      summary: Kill a session
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '204':
          description: Session killed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/send:
    post:
      operationId: sendMessage
      summary: Send a message to a session
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: Message text to send to Claude Code
                  maxLength: 100000
              required: [text]
      responses:
        '202':
          description: Message delivered
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivered:
                    type: boolean
                  attempts:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session not in a state that accepts messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  status:
                    type: string

  /v1/sessions/{id}/read:
    get:
      operationId: readMessages
      summary: Read session transcript
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Byte offset to start reading from
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Parsed transcript entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/TranscriptEntry'
                  hasMore:
                    type: boolean
                  nextOffset:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/events:
    get:
      operationId: subscribeSessionEvents
      summary: SSE event stream for a single session
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: SSE stream of session events
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: status_change
                data: {"id":"abc123","status":"working"}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/children:
    get:
      operationId: getChildren
      summary: List child sessions spawned from this session
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Child sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  children:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/spawn:
    post:
      operationId: spawnChild
      summary: Spawn a child session from a running session
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workDir:
                  type: string
                prompt:
                  type: string
                permissionMode:
                  type: string
                  enum: [default, bypassPermissions, plan, acceptEdits, dontAsk, auto]
      responses:
        '201':
          description: Child session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/fork:
    post:
      operationId: forkSession
      summary: Fork a session — clone context into a new session
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '201':
          description: Forked session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/permissions:
    get:
      operationId: getPermissionPolicy
      summary: Get session's permission policy
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Permission policy
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePermissionPolicy
      summary: Update session's permission policy
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Policy updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/permission-profile:
    get:
      operationId: getPermissionProfile
      summary: Get session's permission profile
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Permission profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    type: string
                    enum: [allow, deny, ask]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePermissionProfile
      summary: Update session's permission profile
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile:
                  type: string
                  enum: [allow, deny, ask]
              required: [profile]
      responses:
        '200':
          description: Profile updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/approve:
    post:
      operationId: approvePermission
      summary: Approve a pending permission prompt
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '202':
          description: Permission approved
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: No pending permission prompt
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /v1/sessions/{id}/reject:
    post:
      operationId: rejectPermission
      summary: Reject a pending permission prompt
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '202':
          description: Permission rejected
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: No pending permission prompt
          content:
            application/json:
              schema:
                type: object

  /v1/sessions/{id}/interrupt:
    post:
      operationId: interruptSession
      summary: Send Ctrl+C to interrupt Claude Code
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '202':
          description: Interrupt sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/escape:
    post:
      operationId: sendEscape
      summary: Send Escape key
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '202':
          description: Escape sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/verify:
    post:
      operationId: verifySession
      summary: Run build + test verification in the session
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  default: npm run build && npm test
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/pane:
    get:
      operationId: capturePane
      summary: Raw terminal capture
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Terminal pane content
          content:
            application/json:
              schema:
                type: object
                properties:
                  pane:
                    type: string
                  uiState:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/command:
    post:
      operationId: sendCommand
      summary: Send a shell command directly
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  description: Shell command to execute
                workingDirectory:
                  type: string
              required: [command]
      responses:
        '202':
          description: Command sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/bash:
    post:
      operationId: sendBash
      summary: Send a bash command (raw, no prompt wrapping)
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
              required: [command]
      responses:
        '202':
          description: Command sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/summary:
    get:
      operationId: getSessionSummary
      summary: Condensed transcript summary
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
                  messages:
                    type: integer
                  toolCalls:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{id}/screenshot:
    post:
      operationId: takeScreenshot
      summary: Screenshot a URL (Playwright)
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to screenshot
      responses:
        '200':
          description: Screenshot taken
          content:
            application/json:
              schema:
                type: object
                properties:
                  screenshot:
                    type: string
                    format: byte
                    description: PNG image data (base64)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          description: Playwright not installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /v1/sessions/{id}/metrics:
    get:
      operationId: getSessionMetrics
      summary: Per-session metrics (token usage, latency, etc.)
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session metrics
