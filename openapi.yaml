openapi: "3.1.0"
info:
  title: "@onestepat4time/aegis"
  version: "0.0.0"
  description: "Orchestrate Claude Code sessions via API. Create, brief, monitor, refine, ship."

servers:
  - url: "/v1"
    description: "API v1"


paths:
  /v1/sessions:
    get:
      summary: "List sessions"
      description: "List active sessions with pagination, status, and project filters."
      tags:
        - "Sessions"

      parameters:
        - name: "page"
          in: "query"
          required: null
          description: "Page number (1-based)"
          schema:
            type: "integer"
            minimum: 1
            maximum: 9007199254740991


        - name: "limit"
          in: "query"
          required: null
          description: "Items per page"
          schema:
            type: "integer"
            minimum: 1
            maximum: 100


        - name: "status"
          in: "query"
          required: null
          description: "Filter by session status"
          schema:
            type: "string"


        - name: "project"
          in: "query"
          required: null
          description: "Filter by project (workDir substring)"
          schema:
            type: "string"



      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  sessions:
                    type: "array"
                    items: {}

                  pagination: {}

                required:
                  - "sessions"
                  - "pagination"

                additionalProperties: false





      operationId: "getV1Sessions"

    post:
      summary: "Create session"
      description: "Create a new Claude Code session in a tmux window. Reuses an existing idle session for the same workDir if available."
      tags:
        - "Sessions"

      requestBody:
        description: "Session creation parameters"
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                workDir:
                  type: "string"
                  minLength: 1

                name:
                  type: "string"
                  maxLength: 200

                prompt:
                  type: "string"
                  maxLength: 100000

                prd:
                  type: "string"
                  maxLength: 100000

                resumeSessionId:
                  type: "string"
                  format: "uuid"
                  pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$"

                claudeCommand:
                  type: "string"
                  maxLength: 500

                env:
                  type: "object"
                  propertyNames:
                    type: "string"

                  additionalProperties:
                    type: "string"


                stallThresholdMs:
                  type: "integer"
                  exclusiveMinimum: 0
                  maximum: 3600000

                permissionMode:
                  type: "string"
                  enum:
                    - "default"
                    - "bypassPermissions"
                    - "plan"
                    - "acceptEdits"
                    - "dontAsk"
                    - "auto"


                autoApprove:
                  type: "boolean"

                parentId:
                  type: "string"
                  format: "uuid"
                  pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$"

                memoryKeys:
                  maxItems: 50
                  type: "array"
                  items:
                    type: "string"



              required:
                - "workDir"

              additionalProperties: false




      responses:
        "200":
          description: "Reused existing idle session"
          content:
            application/json:
              schema: {}



        "201":
          description: "Success"
          content:
            application/json:
              schema: {}



        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error:
                    type: "string"

                  details:
                    type: "array"
                    items: {}


                required:
                  - "error"

                additionalProperties: false




        "422":
          description: "Claude Code version too old"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error:
                    type: "string"

                  code:
                    type: "string"


                required:
                  - "error"
                  - "code"

                additionalProperties: false





      operationId: "postV1Sessions"


  /v1/sessions/history:
    get:
      summary: "Session history"
      description: "Paginated session history (created/killed + active)."
      tags:
        - "Sessions"

      parameters:
        - name: "page"
          in: "query"
          required: false
          schema:
            type: "integer"
            minimum: 1
            maximum: 9007199254740991


        - name: "limit"
          in: "query"
          required: false
          schema:
            type: "integer"
            minimum: 1
            maximum: 200


        - name: "status"
          in: "query"
          required: false
          schema:
            type: "string"


        - name: "ownerKeyId"
          in: "query"
          required: false
          schema:
            type: "string"



      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema: {}



        "401":
          description: "Unauthorized — Bearer token required"

        "403":
          description: "Forbidden: insufficient role"


      operationId: "listSessionHistory"


  /v1/sessions/stats:
    get:
      summary: "Session statistics"
      description: "Aggregated session statistics: active count, by status, totals."
      tags:
        - "Sessions"

      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema: {}



        "401":
          description: "Unauthorized — Bearer token required"

        "403":
          description: "Forbidden: insufficient role"


      operationId: "getV1SessionsStats"


  /v1/sessions/health:
    get:
      summary: "Bulk health check"
      description: "Health status for all visible sessions."
      tags:
        - "Sessions"

      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema: {}



        "401":
          description: "Unauthorized — Bearer token required"

        "403":
          description: "Forbidden: insufficient role"


      operationId: "getSessionsHealth"


  /v1/sessions/batch:
    delete:
      summary: "Bulk delete sessions"
      description: "Kill and remove sessions by IDs or status filter."
      tags:
        - "Sessions"

      requestBody:
        description: "Batch delete parameters — at least one of ids or status is required"
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                ids:
                  maxItems: 100
                  type: "array"
                  items:
                    type: "string"
                    format: "uuid"
                    pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$"


                status:
                  type: "string"
                  enum:
                    - "idle"
                    - "working"
                    - "compacting"
                    - "context_warning"
                    - "waiting_for_input"
                    - "permission_prompt"
                    - "plan_mode"
                    - "ask_question"
                    - "bash_approval"
                    - "settings"
                    - "error"
                    - "unknown"



              additionalProperties: false




      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  deleted:
                    type: "number"

                  notFound:
                    type: "array"
                    items:
                      type: "string"


                  errors:
                    type: "array"
                    items:
                      type: "string"



                required:
                  - "deleted"
                  - "notFound"
                  - "errors"

                additionalProperties: false




        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error:
                    type: "string"

                  details:
                    type: "array"
                    items: {}


                required:
                  - "error"

                additionalProperties: false





      operationId: "deleteV1SessionsBatch"

    post:
      summary: "Batch create sessions"
      description: "Create up to 50 sessions in a single request."
      tags:
        - "Pipelines"

      requestBody:
        description: null
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                sessions:
                  minItems: 1
                  maxItems: 50
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      name:
                        type: "string"
                        maxLength: 200

                      workDir:
                        type: "string"
                        minLength: 1

                      prompt:
                        type: "string"
                        maxLength: 100000

                      permissionMode:
                        type: "string"
                        enum:
                          - "default"
                          - "bypassPermissions"
                          - "plan"
                          - "acceptEdits"
                          - "dontAsk"
                          - "auto"


                      autoApprove:
                        type: "boolean"

                      stallThresholdMs:
                        type: "integer"
                        exclusiveMinimum: 0
                        maximum: 3600000


                    required:
                      - "workDir"

                    additionalProperties: false



              required:
                - "sessions"

              additionalProperties: false




      responses:
        "201":
          description: "Success"
          content:
            application/json:
              schema: {}



        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error:
                    type: "string"

                  details:
                    type: "array"
                    items: {}


                required:
                  - "error"

                additionalProperties: false




        "429":
          description: "Rate limit or session cap exceeded"


      operationId: "postV1SessionsBatch"


  "/v1/sessions/{id}":
    get:
      summary: "Get session"
      description: "Get session details by ID, including action hints for interactive states."
      tags:
        - "Sessions"

      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Session UUID"
          schema:
            type: "string"
            format: "uuid"
            pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$"



      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema: {}



        "403":
          description: "Forbidden: insufficient role"

        "404":
          description: "Not found"


      operationId: "getV1SessionsId"

    delete:
      summary: "Kill session"
      tags:
        - "Session Actions"

      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Session UUID"
          schema:
            type: "string"
            format: "uuid"
            pattern: "^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$"



      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  ok:
                    type: "boolean"


                required:
                  - "ok"

                additionalProperties: false




        "404":
          description: "Not found"


      operationId: "deleteV1SessionsId"


  "/v1/sessions/{id}/health":
    get:
