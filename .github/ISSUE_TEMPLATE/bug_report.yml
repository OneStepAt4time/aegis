name: Bug report
description: Report a problem with Aegis
labels: [bug]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this bug?
      options:
        - Critical — blocks all work (P0)
        - High — blocks major feature (P1)
        - Medium — partial impact, workaround exists (P2)
        - Low — minor issue, no urgent impact (P3-P4)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Aegis is affected?
      options:
        - Backend — server, API, session management
        - Dashboard — web UI, frontend
        - CLI — command-line interface
        - MCP Server — Model Context Protocol server
        - CI/CD — GitHub Actions, workflows
        - Documentation — docs, README, guides
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: How are you running Aegis?
      options:
        - HTTP API
        - MCP (stdio)
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducible?
      options:
        - Always
        - Sometimes
        - Once
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start Aegis with `npx @onestepat4time/aegis`
        2. Create a session via `POST /v1/sessions`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server output, tmux pane content, or error messages
      render: shell

  - type: input
    id: aegis-version
    attributes:
      label: Aegis version
      description: Run `GET /v1/health` and paste the version
      placeholder: e.g. 0.4.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: e.g. v22.14.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.3, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: cc-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`
      placeholder: e.g. 1.0.50
    validations:
      required: true

  - type: input
    id: tmux-version
    attributes:
      label: tmux version
      description: Output of `tmux -V`
      placeholder: e.g. tmux 3.5a
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might help (config, auth setup, etc.)
