name: Publish API Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'typedoc.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Check out published Helm repo
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: published
          fetch-depth: 1
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/configure-pages@v6
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test
      - run: npm run docs
      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site
          cp -R docs/api/. site/
          if [ -d published/helm ]; then
            mkdir -p site/helm
            cp -R published/helm/. site/helm/
          fi
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
