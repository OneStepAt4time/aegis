name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run build:dashboard
      - run: npm test
      - run: cd dashboard && npx vitest run
      - name: Pack artifact
        run: npm pack --pack-destination /tmp
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: /tmp/onestepat4time-aegis-*.tgz
          retention-days: 1

  generate-sbom:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Generate SBOM
        run: |
          npm ci
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format JSON
          cat sbom.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'SBOM: {len(d.get(\"components\",[]))} components')"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

  generate-checksums:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: package
          path: /tmp
      - name: Generate SHA256 checksums
        run: |
          cd /tmp
          for f in *.tgz; do
            echo "$(sha256sum "$f" | cut -d' ' -f1)  $(basename "$f")" >> checksums.txt
          done
          cat checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: /tmp/checksums.txt
          retention-days: 30

  publish-npm:
    needs: test
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v8
        with:
          name: package
          path: .
      - run: npm publish --provenance --access public *.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  ensure-github-release:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Release exists for tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          if [[ "$TAG" == *-alpha* || "$TAG" == *-beta* || "$TAG" == *-rc* ]]; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease --generate-notes
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attach-checksums:
    needs: [publish-npm, generate-checksums, ensure-github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: checksums
          path: .
      - name: Attach checksums to GitHub Release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release upload "$TAG" checksums.txt --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attach-sbom:
    needs: [publish-npm, generate-sbom, ensure-github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: .
      - name: Attach SBOM to GitHub Release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release upload "$TAG" sbom.json --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-clawhub:
    needs: publish-npm
    runs-on: ubuntu-latest
    if: success()
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: ClawHub Login
        if: ${{ env.CLAWHUB_TOKEN != '' }}
        continue-on-error: true
        run: npx clawhub@latest login --token ${{ env.CLAWHUB_TOKEN }}
      - name: Publish to ClawHub
        continue-on-error: true
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npx clawhub@latest publish skill/ --slug aegis --name "Aegis Bridge" --version "$VERSION" --changelog "Release v$VERSION - HTTP/MCP Claude Code orchestration"
