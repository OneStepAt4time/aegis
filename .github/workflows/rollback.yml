name: Prepare Rollback PRs

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Commit SHA or tag to revert from main (for example `abc1234` or `v0.2.0-alpha`)
        required: true
      reason:
        description: Why is this rollback needed?
        required: true
      create_develop_pr:
        description: Also prepare a matching revert PR for develop
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-main-rollback:
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      main_pr_url: ${{ steps.main_pr.outputs.pull-request-url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target ref
        id: resolve
        run: |
          TARGET_SHA=$(git rev-list -n 1 "${{ inputs.target_ref }}")
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${TARGET_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare rollback changes on main
        run: |
          git checkout origin/main
          git revert --no-edit "${{ steps.resolve.outputs.target_sha }}"

      - name: Open rollback PR to main
        id: main_pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: rollback/main-${{ steps.resolve.outputs.short_sha }}
          base: main
          delete-branch: true
          commit-message: "fix(release): rollback ${{ steps.resolve.outputs.short_sha }}"
          title: "fix(release): rollback ${{ steps.resolve.outputs.short_sha }}"
          body: |
            ## Rollback request

            This workflow prepared a rollback PR for `${{ inputs.target_ref }}` (`${{ steps.resolve.outputs.target_sha }}`).

            **Reason:** ${{ inputs.reason }}

            ### Required follow-up
            - Validate CI on this revert PR
            - Merge to `main` only after maintainer approval
            - If approved, ensure the same rollback also lands on `develop`

            > Generated by `rollback.yml`.
          labels: |
            bug
            ci

  prepare-develop-follow-up:
    if: inputs.create_develop_pr
    needs: prepare-main-rollback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare rollback changes on develop
        id: revert_develop
        continue-on-error: true
        run: |
          git checkout origin/develop
          git revert --no-edit "${{ needs.prepare-main-rollback.outputs.target_sha }}"

      - name: Open follow-up rollback PR to develop
        if: steps.revert_develop.outcome == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: rollback/develop-${{ needs.prepare-main-rollback.outputs.short_sha }}
          base: develop
          delete-branch: true
          commit-message: "fix(release): mirror rollback ${{ needs.prepare-main-rollback.outputs.short_sha }} to develop"
          title: "fix(release): mirror rollback ${{ needs.prepare-main-rollback.outputs.short_sha }} to develop"
          body: |
            ## Rollback mirror for develop

            This PR mirrors the rollback prepared for `main` so `develop` stays aligned.

            - Target commit: `${{ needs.prepare-main-rollback.outputs.target_sha }}`
            - Main rollback PR: ${{ needs.prepare-main-rollback.outputs.main_pr_url }}
            - Reason: ${{ inputs.reason }}

            > Generated by `rollback.yml`.
          labels: |
            bug
            ci

      - name: Write workflow summary
        if: always()
        run: |
          echo '## Rollback summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Main rollback PR: ${{ needs.prepare-main-rollback.outputs.main_pr_url }}' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.revert_develop.outcome }}" = "success" ]; then
            echo '- Develop mirror PR: created successfully' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '- Develop mirror PR: manual follow-up required (automatic revert did not apply cleanly)' >> "$GITHUB_STEP_SUMMARY"
          fi
