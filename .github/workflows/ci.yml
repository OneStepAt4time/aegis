name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lockfile lint
        run: npx lockfile-lint --type npm --path package-lock.json --validate-https

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Build dashboard
        run: cd dashboard && npm install && npm run build

      - name: Run tests
        run: npm test

      - name: Run dashboard tests
        run: cd dashboard && npx vitest run

      - name: Audit tracked files
        run: |
          FOUND=$(git ls-files | grep -E '(^should$|results\.tsv|^state/|\.tsbuildinfo$)' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Blacklisted files found in git tracking"
            echo "$FOUND"
            exit 1
          fi
          echo "Audit passed - no blacklisted files found"
