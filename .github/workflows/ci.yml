name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# ⚠️ Branch protection requires these exact check names: "lint-pr-title", "test (20)", "test (22)", "dashboard-test"
# If you rename jobs or change the matrix, update required status checks in repo settings.
jobs:
  lint-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lockfile lint
        run: npx lockfile-lint --type npm --path package-lock.json --validate-https

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          THRESHOLD_KB=2048
          SERVER_SIZE=$(find dist/ -name "*.js" ! -path "*/__tests__/*" -exec du -ck {} + | tail -1 | awk '{print $1}')
          SERVER_SIZE_KB=$((SERVER_SIZE))
          echo "## Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scope | Size (KB) | Threshold (KB) | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----------|----------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SERVER_SIZE_KB" -gt "$THRESHOLD_KB" ]; then
            echo "| Server (excl. tests) | ${SERVER_SIZE_KB} | ${THRESHOLD_KB} | ❌ Exceeds threshold |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Server bundle size ${SERVER_SIZE_KB}KB exceeds ${THRESHOLD_KB}KB threshold"
            exit 1
          else
            echo "| Server (excl. tests) | ${SERVER_SIZE_KB} | ${THRESHOLD_KB} | ✅ Within budget |" >> "$GITHUB_STEP_SUMMARY"
            echo "Server bundle size: ${SERVER_SIZE_KB}KB (threshold: ${THRESHOLD_KB}KB)"
          fi

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Run tests
        run: npm test

      - name: Audit tracked files
        run: |
          FOUND=$(git ls-files | grep -E '(^should$|results\.tsv|^state/|\.tsbuildinfo$|\.env$|\.log$|\.tmp$|\.bak$|\.swp$)' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Blacklisted files found in git tracking"
            echo "$FOUND"
            exit 1
          fi
          echo "Audit passed - no blacklisted files found"

  dashboard-test:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Run dashboard tests
        run: cd dashboard && npx vitest run
